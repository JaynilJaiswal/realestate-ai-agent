version: '3.8'

services:
  # 1. The Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - agent_network

  # 2. The LangGraph & FastAPI Backend
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Pass the Groq API key from your local .env file into the container
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - qdrant
    networks:
      - agent_network

  # 3. The Streamlit UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      # Tell Streamlit how to talk to the backend container across the Docker network
      - API_URL=http://backend:8000/api/v1/query
    depends_on:
      - backend
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge