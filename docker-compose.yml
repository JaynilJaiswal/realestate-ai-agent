version: '3.8'

services:
  # 1. The Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - agent_network

  # 2. The LangGraph & FastAPI Backend
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Pass the Groq API key from your local .env file into the container
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - qdrant
    networks:
      - agent_network

  # 3. The Streamlit UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      # Tell Streamlit how to talk to the backend container across the Docker network
      - API_URL=http://backend:8000/api/v1/query
    depends_on:
      - backend
    networks:
      - agent_network

  renderer:
    image: grafana/grafana-image-renderer:latest
    ports:
      - "8081"
    networks:
      - agent_network

  grafana:
    image: grafana/grafana-enterprise:latest
    ports:
      - "3000:3000"
    environment:
      # URL where Grafana sends render requests
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      # URL where Renderer sends images back to Grafana
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      # Default auth token (must match between both if customized)
      GF_RENDERING_RENDERER_TOKEN: "-"
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge